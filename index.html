<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anajak Expense</title>
    <link rel="stylesheet" href="./css/output.css" />
    <link rel="stylesheet" href="./css/component.css" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet" />
  </head>
  <body class="bg-slate-50 min-h-screen text-slate-900 overflow-x-hidden">
    <!-- Auth View -->
    <div id="auth-view" class="min-h-screen flex items-center justify-center p-4">
      <div class="blur-blob bg-indigo-100 w-[40vw] h-[40vw] -top-[10%] -right-[10%]"></div>
      <div class="blur-blob bg-blue-100 w-[40vw] h-[40vw] -bottom-[10%] -left-[10%]"></div>

      <div
        class="max-w-md w-full bg-white rounded-3xl shadow-xl shadow-slate-200/50 overflow-hidden border border-slate-100 transition-all duration-500 scale-in">
        <div class="p-8 pb-4 text-center">
          <div
            class="w-12 h-12 bg-indigo-600 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-lg shadow-indigo-200 rotate-3">
            <i class="fa-solid fa-lock text-white text-2xl"></i>
          </div>
          <h1 id="auth-title" class="text-2xl font-bold tracking-tight text-slate-900">Welcome to Anajak</h1>
          <p id="auth-subtitle" class="text-slate-500 mt-2 text-sm">Enter your credentials to access your dashboard</p>
        </div>

        <!-- Success Alert - Hidden by default with 'hidden' class -->
        <div
          id="status-alert"
          class="mx-8 mb-4 p-3 bg-emerald-50 border border-emerald-100 rounded-xl flex items-center gap-3 text-emerald-700 text-sm hidden">
          <i class="fa-solid fa-circle-check"></i>
          <span id="status-text">Success! Redirecting you now...</span>
        </div>

        <!-- Error Alert - Hidden by default with 'hidden' class -->
        <div
          id="error-alert"
          class="mx-8 mb-4 p-3 bg-rose-50 border border-rose-100 rounded-xl flex items-center gap-3 text-rose-700 text-sm hidden">
          <i class="fa-solid fa-circle-xmark"></i>
          <span>Invalid email or password.</span>
        </div>

        <div class="p-8 pt-4">
          <form id="auth-form" class="space-y-4">
            <div class="space-y-1">
              <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider ml-1">Email Address</label>
              <div class="relative group">
                <input
                  type="email"
                  id="email"
                  required
                  placeholder="name@gmail.com"
                  class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all" />
                <div
                  class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-indigo-500 transition-colors">
                  <i class="fa-regular fa-envelope"></i>
                </div>
              </div>
            </div>

            <div class="space-y-1">
              <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider ml-1">Password</label>
              <div class="relative group">
                <input
                  type="password"
                  id="password"
                  required
                  placeholder="••••••••"
                  class="w-full pl-10 pr-12 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all" />
                <div
                  class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-indigo-500 transition-colors">
                  <i class="fa-solid fa-lock"></i>
                </div>
                <button
                  type="button"
                  id="toggle-password"
                  class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 transition-colors">
                  <i class="fa-regular fa-eye-slash" id="eye-icon"></i>
                </button>
              </div>
            </div>

            <button
              type="submit"
              id="submit-btn"
              class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3.5 rounded-xl transition-all shadow-md flex items-center justify-center gap-2 active:scale-[0.98]">
              <span id="btn-text">Sign In</span>
              <div
                id="btn-loader"
                class="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin hidden"></div>
            </button>
          </form>

          <div class="relative my-8">
            <div class="absolute inset-0 flex items-center">
              <span class="w-full border-t border-slate-200"></span>
            </div>
            <div class="relative flex justify-center text-xs uppercase">
              <span class="bg-white px-4 text-slate-400 font-medium">Or continue with</span>
            </div>
          </div>

          <div class="grid grid-cols-2 gap-4">
            <button
              class="flex items-center justify-center gap-2 py-2.5 px-4 border border-slate-200 rounded-xl hover:bg-slate-50 transition-colors font-medium text-sm text-slate-700">
              <i class="fa-brands fa-google text-rose-500"></i> Google
            </button>
            <button
              class="flex items-center justify-center gap-2 py-2.5 px-4 border border-slate-200 rounded-xl hover:bg-slate-50 transition-colors font-medium text-sm text-slate-700">
              <i class="fa-brands fa-facebook text-blue-600 text-lg"></i> Facebook
            </button>
          </div>
        </div>

        <div class="p-6 bg-slate-50/50 border-t border-slate-100 text-center">
          <p class="text-sm text-slate-500">
            <span id="toggle-text">Don't have an account?</span>
            <button id="toggle-auth-mode" class="text-indigo-600 font-bold hover:underline ml-1">Sign up</button>
          </p>
        </div>
      </div>
    </div>

    <script src="./js/auth.js"></script>
  </body>
</html>
